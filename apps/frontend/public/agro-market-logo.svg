<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0f0d"/>

  <!-- Green accent glow -->
  <circle cx="256" cy="256" r="200" fill="rgba(0,230,118,0.04)"/>
  <circle cx="256" cy="256" r="140" fill="rgba(0,230,118,0.06)"/>

  <!-- Truck icon -->
  <g transform="translate(136, 160)" stroke="#00e676" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cab -->
    <rect x="0" y="40" width="100" height="80" rx="12"/>
    <!-- Windshield -->
    <line x1="20" y1="60" x2="80" y2="60"/>
    <!-- Cargo bed -->
    <rect x="110" y="20" width="130" height="100" rx="8"/>
    <!-- Cargo line -->
    <line x1="110" y1="70" x2="240" y2="70"/>
    <!-- Wheels -->
    <circle cx="50" cy="130" r="22"/>
    <circle cx="190" cy="130" r="22"/>
    <!-- Axle lines -->
    <line x1="50" y1="120" x2="50" y2="108"/>
    <line x1="190" y1="120" x2="190" y2="108"/>
  </g>

  <!-- Leaf accent -->
  <g transform="translate(340, 130)" fill="#00e676" opacity="0.6">
    <path d="M0 40 Q20 0 50 0 Q30 20 30 50 Q10 30 0 40Z" transform="rotate(-30, 25, 20)"/>
  </g>

  <!-- Brand text -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#ffffff" letter-spacing="2">AgroMarket</text>

  <!-- Tagline -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#00e676" letter-spacing="4" font-weight="600">B2B MARKETPLACE</text>
</svg>
